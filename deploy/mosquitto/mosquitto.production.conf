# Eclipse Mosquitto PRODUCTION configuration for cam-platform
# Copy this to mosquitto.conf and generate passwords:
#   docker run --rm -it eclipse-mosquitto:2.0 mosquitto_passwd -c /mosquitto/config/passwd camapi
#
# ── Listeners ────────────────────────────────────────────────────────────────
listener 1883 0.0.0.0
protocol mqtt

listener 9001
protocol websockets

# ── Auth ─────────────────────────────────────────────────────────────────────
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Persistence ──────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# ── Logging ──────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_timestamp true

# ── Performance ──────────────────────────────────────────────────────────────
max_connections 1000
max_queued_messages 1000
message_size_limit 1048576
