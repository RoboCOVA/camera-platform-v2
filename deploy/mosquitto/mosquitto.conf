# Eclipse Mosquitto configuration for cam-platform
# Internal only — never expose port 1883 to the internet.
# Agents connect via WireGuard tunnel.

# ── Listeners ────────────────────────────────────────────────────────────────
# Internal plaintext (Docker network only)
listener 1883 0.0.0.0
protocol mqtt

# WebSocket for browser clients (optional, for future use)
listener 9001
protocol websockets

# ── Auth ─────────────────────────────────────────────────────────────────────
# Password auth is handled via password_file when it exists.
# For local dev: the setup script generates a hashed passwd file.
# For production: generate with `mosquitto_passwd -c /path/to/passwd <username>`
#
# If no password file exists, allow anonymous for bootstrapping.
# The docker-compose.yml mounts the password file if it exists.
allow_anonymous true

# ── Persistence ──────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# ── Logging ──────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type information
log_timestamp true

# ── Performance ──────────────────────────────────────────────────────────────
max_connections 1000
max_queued_messages 1000
message_size_limit 1048576    # 1MB max message (for snapshot payloads)

# ── Topic ACL ─────────────────────────────────────────────────────────────────
# Each device/agent can only publish to its own org/site topic tree.
# The API user subscribes to all topics.
# Format: acl_file /mosquitto/config/acl
# See deploy/mosquitto/acl for topic ACL rules.
